name: Build and Push Docker Image

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: gemneye/higgs-audio-v2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify minimal container build
      run: |
        echo "Building minimal serverless container (~100MB vs previous ~10GB+)"
        echo "Disk usage before build:"
        df -h
        echo "No cleanup needed - minimal container architecture"
        df -h

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: main-build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=main
        cache-to: type=gha,mode=max,scope=main
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Build completed
      run: |
        echo "Main container build completed"
        echo "Minimal architecture eliminates disk space issues"

    - name: Build vLLM Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./examples/vllm/Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vllm:${{ github.ref_name }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-vllm:latest
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=vllm
        cache-to: type=gha,mode=max,scope=vllm
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Update DockerHub Description
      if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
      uses: peter-evans/dockerhub-description@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        repository: ${{ env.IMAGE_NAME }}
        readme-filepath: ./.dockerhub/description.md
        short-description-filepath: ./.dockerhub/short-description.txt

    - name: Build summary
      run: |
        echo "Build completed successfully with minimal serverless architecture"
        echo "Container sizes should be ~100MB instead of previous ~10GB+"
        docker images --format "table {{.Repository}}	{{.Tag}}	{{.Size}}" | grep higgs-audio

    - name: Image digest
      if: github.event_name != 'pull_request'
      run: echo ${{ steps.build.outputs.digest }}